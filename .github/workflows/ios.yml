name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Generate App Icons
        run: dart run flutter_launcher_icons

      - name: Add Widget Target
        run: |
          sudo gem install xcodeproj
          ruby add_widget_target.rb
        working-directory: ios
      
      - name: Debug - list all targets and product names
  run: |
    echo "--- Runner.xcodeproj targets ---"
    ruby -rxcodeproj -e '
      p = Xcodeproj::Project.open("Runner.xcodeproj")
      p.targets.each do |t|
        puts "#{t.name} | type=#{t.product_type}"
        t.build_configurations.each do |c|
          puts "  #{c.name}: PRODUCT_NAME=#{c.build_settings["PRODUCT_NAME"].inspect}"
        end
      end
    '
    echo "--- Pods.xcodeproj targets (app-extension type only) ---"
    ruby -rxcodeproj -e '
      p = Xcodeproj::Project.open("Pods/Pods.xcodeproj")
      p.targets.each do |t|
        next unless t.product_type.to_s.include?("app-extension")
        puts "#{t.name} | type=#{t.product_type}"
      end
    '
  working-directory: ios


      - name: Build unsigned iOS release
        run: flutter build ios --release --no-codesign -v

      - name: Package into IPA format
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Payload.zip Payload
          mv Payload.zip ../../../app.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: app.ipa
