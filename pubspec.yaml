name: khalaf_quran
description: "A Khalaf Quran reading app."
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  dio: ^5.3.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  just_audio: ^0.9.31
  path_provider: ^2.1.0
  pdfrx: ^2.4.7
  shared_preferences: ^2.2.0
  vector_math: ^2.1.0
  file_picker: ^8.0.0
  permission_handler: ^11.4.0
  timezone: ^0.9.0
  home_widget: ^0.7.0
  wakelock_plus: ^1.3.1
  quick_actions: ^1.0.7
  vibration: ^2.0.0
  geolocator: ^13.0.2
  audio_service: ^0.18.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D2B0D"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/pdf/
    - assets/icon/
  fonts:
    - family: Scheherazade New
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
          weight: 400
